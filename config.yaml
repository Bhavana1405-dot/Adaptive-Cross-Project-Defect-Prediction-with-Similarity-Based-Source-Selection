dataset_path: "data/"

target_project: "ant"

top_k: 3

use_code_embeddings: true

feature_selection:
  method: "lasso_rfe"
  n_features: 50

domain_adaptation:
  use_coral: true
  use_pca: true
  pca_components: 12

imbalance_handling:
  use_smote: true
  smote_ratio: 1.0

model:
  type: "random_forest"
  n_estimators: 200

evaluation:
  metrics:
    - f1
    - auc
    - mcc
    - accuracy
